<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>leaderboard</title>
</head>
<body>
    
    <table>
        <thead>
            <tr>
                <td>Name</td>
                <td>Username</td>
                <td>Wins</td>
            </tr>
        </thead>
        <tbody th:each=" user : ${users}">
            <tr>
                <td th:text="${user.name}"></td>
                <td th:text="${user.username}"></td>
                <td th:text="${user.wins}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
