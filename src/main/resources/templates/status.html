<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .outerDiv{
            align-items: center;
            align-content: center;
        }

    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result</title>

</head>
<body>

    <div th:if="${life == 0}" class="outerDiv">
        <div>
            <b>
                <i>
                    SAD! You Failed.
                </i>
            </b>
        </div>
        <div>
            <b>
                <i>
                    Time taken : <span th:text="${time}"></span>
                </i>
            </b>
        </div>
    </div>
    
    <div th:unless="${life == 0}" class="outerDiv">
        <div>
            <b>
                <i>
                    Congratulation! You completed game in <span th:text="${time}"></span> seconds
                </i>
            </b>
        </div>
    </div>

    <div class="OuterBox">
        <form th:action="@{/play}" method="post">
            <button type="submit">Play Again</button>
        </form>
    
        <form th:action="@{/}" method="get">
            <button type="submit">Home</button>
        </form>
    </div>
    
</body>
</html>
